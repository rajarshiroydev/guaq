services:
  # 1. The Database (Shared by n8n and dify)
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    networks:
      - guaq_net
    ports:
      - 5432:5432
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U admin -d postgres
      interval: 5s
      timeout: 5s
      retries: 5
  # 2. Redis (Shared Cache - Critical for n8n performance)
  redis:
    image: redis:alpine
    restart: always
    networks:
      - guaq_net
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 5
  # 3. n8n (Automation) - Port 5678
  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: always
    ports:
      - 5678:5678
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_db
      - DB_POSTGRESDB_USER=admin
      - DB_POSTGRESDB_PASSWORD=admin
      - N8N_ENCRYPTION_KEY=supersecretkey123
      - N8N_HOST=n8n.local
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - guaq_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 4. Dify API (The Brain)
  dify-api:
    image: langgenius/dify-api:latest
    restart: always
    ports:
      - 20081:5001
    environment:
      - DB_USERNAME=admin
      - DB_PASSWORD=admin
      - DB_HOST=postgres 
      - DB_PORT=5432
      - DB_DATABASE=dify_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=1 
      - CELERY_BROKER_URL=redis://redis:6379/1
      - MODE=api
      - VECTOR_STORE=pgvector
      - UPLOAD_PROVIDERS=local
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/api/storage
      - SECRET_KEY=supersecretkey123
    volumes:
      - dify_storage:/app/api/storage
    networks:
      - guaq_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  # 5. Dify Worker (The Background Task Runner)
  dify-worker:
    image: langgenius/dify-api:latest
    restart: always
    environment:
      - DB_USERNAME=admin
      - DB_PASSWORD=admin
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=dify_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=1
      - CELERY_BROKER_URL=redis://redis:6379/1
      - MODE=worker
      - VECTOR_STORE=pgvector
      - SECRET_KEY=supersecretkey123
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/api/storage
    volumes:
      - dify_storage:/app/api/storage
    networks:
      - guaq_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  # 6. Dify Web (The Frontend Interface)
  dify-web:
    image: langgenius/dify-web:latest
    restart: always
    ports:
      - 20080:3000
    environment:
      - CONSOLE_API_URL=http://localhost:20081
      - APP_API_URL=http://localhost:20081
    networks:
      - guaq_net
    depends_on:
      - dify-api

  # 7. MinIO (S3-like blob storage)
  minio:
    image: minio/minio
    restart: always
    command: server /data --console-address ":9001"
    ports:
      - 9000:9000
      - 9001:9001
    environment:
      - MINIO_ROOT_USER=guaqai
      - MINIO_ROOT_PASSWORD=GuaqAI@2025
    volumes:
      - ./clients:/data
    networks:
      - guaq_net

volumes:
  postgres_data: null
  n8n_data: null
  dify_storage: null
networks:
  guaq_net:
    driver: bridge